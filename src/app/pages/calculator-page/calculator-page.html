<div class="form-container">
      <div class="calculator-form">
        <label for="num1">First Number</label>
        <input [(ngModel)]="num1" type="number" placeholder="Enter first number" value="">

        <label for="num2">Second Number</label>
        <input [(ngModel)]="num2" type="text" placeholder="Enter second number" value="">

        <div class="button-group">
          <button class="save-btn" (click)="btnCalculate('+')">
            <i class="fa-solid fa-add"></i>  Add
          </button>
          <button class="save-btn" (click)="btnCalculate('-')">
            <i class="fa-solid fa-minus"></i> Subtract
          </button>
        </div>

        <div class="result-text">
          Result: {{ result }}
          @if(result != 0){
            <div [ngClass]="result <= 10 ? 'error':'correct' ">Number is {{ result <= 10 ? 'less':'more' }} than 10</div> 
          }
            <!-- } 
            @else {
              <div [ngClass]="result <= 10 ? 'error':'correct' ">Number is more than 10</div> 
            } -->
        </div>

      </div>
  </div>
